name: Submit to B12

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  submit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Submit to B12
      run: |
        python submit_b12.py \
          "Yash Sokalla" \
          "yash97sde@gmail.com" \
          "https://yash97sde.github.io/b12-application/Yash_Sokalla_FullStack_Final.pdf" \
          "https://github.com/yash97sde/b12-application" \
          "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
